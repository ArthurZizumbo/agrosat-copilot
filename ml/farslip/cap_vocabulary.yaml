# Vocabulario CAP italiano para FarSLIP US-017 / US-016b.
#
# Estructura por clase:
#   <cap_class>:
#     it: lista de 3 plantillas (bare, with_phenology, with_region)
#     es: idem en espanol neutro
#     en: idem en ingles
#     phenology: lista de fenofases agronomicas usables en plantilla 2
#     regions:   lista de regiones italianas usables en plantilla 3
#
# Las plantillas son cadenas con marcadores {phenology}, {region} que el
# dataset builder rellena con valores reales (DOY -> fenofase, ROI -> region).
# El builder rota plantillas por crop para diversidad lexical.

defaults:
  phenology: ["germinazione", "fioritura", "fruttificazione", "maturazione", "raccolta"]
  regions: ["Pianura Padana", "Toscana", "Puglia"]

classes:
