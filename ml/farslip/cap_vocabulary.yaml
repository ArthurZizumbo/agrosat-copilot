    it:
      - "campo di mais"
      - "mais in fase di {phenology}"
      - "coltivazione di mais in {region}"
    es:
      - "campo de maiz"
      - "maiz en fase de {phenology}"
      - "cultivo de maiz en {region}"
    en:
      - "maize field"
      - "maize at {phenology} stage"
      - "maize crop in {region}"

