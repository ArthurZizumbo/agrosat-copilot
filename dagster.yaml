# Configuracion de la instancia Dagster (Dagster 1.9+).
# Notas:
# - `dagster_postgres.*` viene del paquete `dagster-postgres` (poetry group `dagster`).
# - `dagster.core.*` es la ruta publica documentada para `run_launcher` y
#   `run_coordinator` en `dagster.yaml`. `dagster._core.*` es interno y no debe
#   usarse en configuracion declarativa.
# - `DATABASE_URL` se inyecta desde `.env.local` (dev) o Secret Manager (prod).

run_storage:
  module: dagster_postgres.run_storage
  class: PostgresRunStorage
  config:
    postgres_url:
      env: DATABASE_URL

event_log_storage:
  module: dagster_postgres.event_log
  class: PostgresEventLogStorage
  config:
    postgres_url:
      env: DATABASE_URL

schedule_storage:
  module: dagster_postgres.schedule_storage
  class: PostgresScheduleStorage
  config:
    postgres_url:
      env: DATABASE_URL

run_launcher:
  module: dagster.core.launcher
  class: DefaultRunLauncher

run_coordinator:
  module: dagster.core.run_coordinator
  class: QueuedRunCoordinator
  config:
    max_concurrent_runs: 5
